# ─────────────────────────────────────────────────────────────────────────────
# 03 · Security Scan — CodeQL SAST + npm audit + Trivy image scan
# Trigger : push to main + every Monday 08:00 UTC (scheduled)
# Purpose : catch vulnerabilities in code, deps, and Docker image
# ─────────────────────────────────────────────────────────────────────────────

name: 03 · Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'     # every Monday 08:00 UTC
  workflow_dispatch:          # manual trigger

jobs:
  # ── 1. Dependency audit ────────────────────────────────────────────────────
  npm-audit:
    name: 📦 npm Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - name: Run npm audit (high & critical only)
        run: npm audit --audit-level=high
        continue-on-error: true    # report but don't block on moderate issues

      - name: Generate audit JSON report
        run: npm audit --json > npm-audit-report.json || true

      - name: Upload audit report
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit-report
          path: app/npm-audit-report.json
          retention-days: 30

  # ── 2. CodeQL SAST ────────────────────────────────────────────────────────
  codeql:
    name: 🔬 CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read 

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript

  # ── 3. Trivy image scan ───────────────────────────────────────────────────
  trivy:
    name: 🛡️ Trivy Image Scan
    runs-on: ubuntu-latest
    needs: []    # runs independently
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Build image locally for scanning
        run: |
          docker build \
            --file docker/Dockerfile \
            --target production \
            --tag cicd-blueprints:scan \
            ./app

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cicd-blueprints:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'    # report only; set to '1' to fail on critical

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Upload Trivy report artifact
        uses: actions/upload-artifact@v7
        with:
          name: trivy-scan-results
          path: trivy-results.sarif
          retention-days: 30
