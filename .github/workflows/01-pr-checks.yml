# ─────────────────────────────────────────────────────────────────────────────
# 01 · PR Checks — Lint, Format, Test, Coverage
# Trigger : every pull_request targeting main or develop
# Purpose : fast feedback loop; blocks merge on failure
# ─────────────────────────────────────────────────────────────────────────────

name: 01 · PR Checks

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'app/**'
      - '.github/workflows/01-pr-checks.yml'

concurrency:
  group: pr-checks-${{ github.head_ref }}
  cancel-in-progress: true   # cancel older run if new commit pushed to PR

jobs:
  lint-and-format:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier format check
        run: npm run format:check

  test:
    name: 🧪 Test & Coverage
    runs-on: ubuntu-latest
    needs: lint-and-format          # only run tests if lint passes
    defaults:
      run:
        working-directory: app

    strategy:
      matrix:
        node-version: [18, 20]      # test on multiple Node versions

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test
        env:
          NODE_ENV: test

      - name: Upload coverage report
        if: matrix.node-version == 20   # upload once, from primary version
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: app/coverage/
          retention-days: 7

  pr-summary:
    name: ✅ PR Summary
    runs-on: ubuntu-latest
    needs: [lint-and-format, test]
    if: always()
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Post result comment
        uses: actions/github-script@v9
        with:
          script: |
            const lint   = '${{ needs.lint-and-format.result }}';
            const test   = '${{ needs.test.result }}';
            const icon   = (r) => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';
            const body   = [
              '## CI Results',
              `| Job | Status |`,
              `|-----|--------|`,
              `| Lint & Format | ${icon(lint)} ${lint} |`,
              `| Test & Coverage | ${icon(test)} ${test} |`,
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
