# Dependabot — automatically opens PRs to keep deps up to date
# Docs: https://docs.github.com/en/code-security/dependabot

version: 2
updates:

  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 5

  # ── npm (app) ─────────────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /app
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    commit-message:
      prefix: "chore"
    labels:
      - dependencies
      - npm
    open-pull-requests-limit: 5
    # Group all non-breaking updates into a single PR to reduce noise
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch

  # ── Docker ────────────────────────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: UTC
    commit-message:
      prefix: "ci"
    labels:
      - dependencies
      - docker
    open-pull-requests-limit: 3
